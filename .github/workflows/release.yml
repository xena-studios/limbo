name: Release (latest)

# Keep a single rolling "latest" release whose jar is the freshest build on main.
# No cron: since the version *is* the commit, a timed rebuild would just reproduce
# the same jar — the release only changes when a commit does.
on:
  push:
    branches: [ main ]

# Don't let overlapping pushes clobber the release; newest wins.
concurrency:
  group: release-latest
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      # Stable asset name so the download URL never changes; the commit-derived
      # version still lives in the jar's plugin.yml and build-info.properties.
      - name: Stage stable-named jar
        run: cp build/libs/Limbo-*.jar Limbo-latest.jar

      # Delete the previous release + tag so the recreated one below gets a fresh
      # published timestamp (a plain update keeps the original date) and the
      # `latest` tag moves to this commit.
      - name: Clear previous latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Create rolling latest release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: false
          make_latest: true
          files: Limbo-latest.jar
          body: |
            Rolling build of the latest commit on `main`.

            - Commit: `${{ github.sha }}`
            - Ref: `${{ github.ref_name }}`

            The jar's internal version (`<yyyy.MM.dd>+<short-sha>`) identifies the exact build.
