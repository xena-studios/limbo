name: Build

# Build every push and pull request; upload the shadow jar so every commit has a
# downloadable artifact.
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the git-derived version resolves

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: Limbo-jar
          path: build/libs/Limbo-*.jar
          if-no-files-found: error
