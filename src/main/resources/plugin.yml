name: xLimbo
version: '${version}'
main: co.xenastudios.xlimbo.XLimboPlugin
api-version: '1.18'
author: Xena Studios
description: Rock-solid fallback void sandbox for Minecraft networks.
website: https://github.com/xena-studios/xlimbo
# Load early so the fallback world is ready before players are routed here.
load: STARTUP

commands:
  join:
    description: Send yourself back to the main server via the proxy.
    usage: /join
  xlimbo:
    description: xLimbo admin command (reload/info).
    usage: /xlimbo <reload|info>

permissions:
  xlimbo.join:
    description: Allows use of /join to connect to the main server.
    default: true
  xlimbo.admin:
    description: Allows use of /xlimbo admin subcommands (reload/info).
    default: op
