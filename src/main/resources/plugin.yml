name: Limbo
version: '${version}'
main: co.xenastudios.limbo.LimboPlugin
api-version: '1.18'
author: Xena Studios
description: Rock-solid fallback void sandbox for Minecraft networks.
website: https://github.com/xena-studios/limbo
# Load early so the fallback world is ready before players are routed here.
load: STARTUP

commands:
  join:
    description: Send yourself back to the main server via the proxy.
    usage: /join
  limbo:
    description: Limbo admin command (reload/info).
    usage: /limbo <reload|info>

permissions:
  limbo.join:
    description: Allows use of /join to connect to the main server.
    default: true
  limbo.admin:
    description: Allows use of /limbo admin subcommands (reload/info).
    default: op
